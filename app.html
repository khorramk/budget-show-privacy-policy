<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Budget Show Redirecting...</title>
</head>
<body>
    <p>Redirecting you safely to your Theme Customizer Studio...</p>

    <script>
        // 1. Grab the merchant's shop domain parameters from Shopify's incoming request
        const urlParams = new URLSearchParams(window.location.search);
        const shop = urlParams.get('shop') || urlParams.get('merchant');

        if (shop) {
            // 2. Build the exact destination path to their theme customization panel
            const customizerUrl = `https://${shop}/admin/themes/current/editor`;
            
            // 3. Break out of the iframe secure sandbox and redirect the parent window
            window.top.location.href = customizerUrl;
        } else {
            // Fallback just in case no parameters are present
            document.body.innerHTML = "<h3>Configuration error: Please launch this app directly from your Shopify Admin Apps menu.</h3>";
        }
    </script>
</body>
</html>
